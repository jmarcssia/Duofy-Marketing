# Regras de maquina por agente: injetadas no prompt E validadas apos a geracao.
research_agent:
  # Minimo para NAO recusar (piso). A Profunda mira o maximo de fontes; a coleta
  # multi-angulo entrega dezenas, entao 3 e apenas o piso de seguranca.
  min_sources: { quick: 3, deep: 3 }
  # Checagem minima do Guardiao (o prompt exige a estrutura completa do relatorio).
  required_sections:
    - "Resumo executivo"
    - "Referências"
  citation_required: true
  forbidden:
    - "confiança nula"
    - "ausência total de fontes"
    - "vácuo de informação"
    - "hipotético"
    # Anti-placeholder: concorrentes/exemplos fictícios são proibidos.
    - "Empresa A"
    - "Empresa B"
    - "Empresa C"
    - "Player 1"
    - "Player 2"
    - "Concorrente X"
    - "Concorrente Y"
    - "Fornecedor genérico"
content_agent:
  required_sections:
    default:
      - "Objetivo editorial"
      - "Conteúdo final"
      - "CTA"
  citation_required: false
  forbidden:
    - "[preencher]"
    - "lorem ipsum"
