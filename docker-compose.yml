services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: duofy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-duofy_v1}
      POSTGRES_USER: ${POSTGRES_USER:-duofy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-duofy}
    # Bind apenas em loopback: o banco nao fica exposto na rede local.
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: duofy-redis
    restart: unless-stopped
    # Bind apenas em loopback.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Aplica as migrations antes de api/worker aceitarem trafego.
  # Servico one-shot: roda 'alembic upgrade head' e sai (restart: no).
  migrate:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: duofy-migrate
    command: ["alembic", "upgrade", "head"]
    # Dev: migrations montadas → novas revisions rodam sem rebuild do migrate.
    volumes:
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./apps/api/app:/app/app
      - ./config:/app/config
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://duofy:duofy@postgres:5432/duofy_v1}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: duofy-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://duofy:duofy@postgres:5432/duofy_v1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev-only-32-bytes-minimum}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@duofy.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_NAME: ${ADMIN_NAME:-Admin Duofy}
    ports:
      - "${API_PORT:-8000}:8000"
    # Dev: código montado + --reload → mudanças no backend entram sem rebuild.
    # (Produção usa a imagem assada, sem estes binds — ver docker-compose.prod.yml.)
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "/app/app"]
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
      - ./config:/app/config
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./apps/web
    container_name: duofy-web
    restart: unless-stopped
    environment:
      # C5: vazio => o browser fala com a MESMA origem (/api) e o cookie HttpOnly de sessão
      # é enviado. O proxy server-side do Next encaminha /api para o serviço da API.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      API_PROXY_TARGET: ${API_PROXY_TARGET:-http://api:8000}
      # Hot-reload do código do host (Windows precisa de polling para o watcher).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    # Bind do código-fonte para hot-reload; node_modules e .next ficam em volumes
    # nomeados para preservar o build da imagem (não são sombreados pelo host).
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (IPv4) — next dev escuta em 0.0.0.0; "localhost" resolveria ::1 e falharia.
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: duofy-worker
    restart: unless-stopped
    command: ["celery", "-A", "app.worker.celery_app", "worker", "--loglevel=INFO", "--pool=solo"]
    # Dev: código montado (um `docker compose restart worker` aplica mudanças, sem rebuild).
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
      - ./config:/app/config
      - ./storage:/app/storage
    environment:
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://duofy:duofy@postgres:5432/duofy_v1}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-local-dev-only-32-bytes-minimum}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@duofy.com.br}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123456}
      ADMIN_NAME: ${ADMIN_NAME:-Admin Duofy}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  web_next:
